name: iOS CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Test
        run: |
          cd NewsApp

          xcodebuild clean test \
          -project NewsApp.xcodeproj \
          -scheme NewsApp \
          -destination 'platform=iOS Simulator,name=iPhone 16'
