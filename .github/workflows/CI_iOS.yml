name: CI-iOS
on:
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 8
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode
      run: sudo xcode-select -switch /Applications/Xcode_16.2.app
      
    - name: Xcode version
      run: /usr/bin/xcodebuild -version
      
    - name: Build and Test iOS
      run: xcodebuild clean build test -project NewsApp/NewsApp.xcodeproj -scheme "CI_iOS" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO -sdk iphonesimulator -destination "platform=iOS Simulator,OS=latest,name=iPhone 17" ONLY_ACTIVE_ARCH=YES
